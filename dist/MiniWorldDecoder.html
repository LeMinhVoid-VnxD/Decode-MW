<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>MiniWorld Lua Decoder</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.btn-success:hover { background: #16a34a; }

.drop-zone-icon { font-size: 40px; margin-bottom: 12px; }
.drop-zone-text { color: #94a3b8; font-size: 14px; }
.drop-zone-text strong { color: #60a5fa; }
.status { padding: 12px 16px; border-radius: 8px; margin: 12px 0; font-size: 14px; display: none; }
.status.info { background: #1e3a5f; color: #93c5fd; display: block; }
.status.success { background: #14532d; color: #86efac; display: block; }
.status.error { background: #450a0a; color: #fca5a5; display: block; }
.key-display { padding: 10px 14px; background: #0f172a; border-radius: 8px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; color: #c084fc; word-break: break-all; }

    <div style="margin-top:12px;" class="row">

    <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:8px;">

      <span id="fileCount" style="color:#94a3b8;font-size:13px;"></span>
    </div>
    <div class="summary" id="summary"></div>
    <div class="file-list" id="fileList"></div>
    <div class="download-area hidden" id="downloadArea">
      <button class="btn btn-success" id="btnDownload" style="width:100%;" data-i18n="btnDownload">Tải xuống tất cả .lua (phẳng, folder_file.lua)</button>
    </div>
    <div class="download-area hidden" id="structureArea">
      <button class="btn btn-success" id="btnStructure" style="width:100%;" data-i18n="btnStructure">Tải về giữ cấu trúc folder (ZIP)</button>
    </div>
    <div class="download-area hidden" id="luaOnlyArea">
      <button class="btn btn-success" id="btnLuaOnly" style="width:100%;" data-i18n="btnLuaOnly">Tải chỉ .lua đã decode (phẳng)</button>
    </div>
    <div class="download-area hidden" id="inplaceArea">
      <button class="btn btn-success" id="btnInplace" style="width:100%;" data-i18n="btnInplace">Ghi đè vào file gốc</button>
    </div>
  </div>

  <div style="text-align:center;padding:20px 0;color:#475569;font-size:12px;">
    MiniWorld Lua Decoder
  </div>
</div>

<script>

var currentLang = localStorage.getItem('mwdecoder_lang') || 'vi';

function __(key, vars) {
  var text = LANG[currentLang] && LANG[currentLang][key];
  if (!text) text = LANG.vi[key] || key;
  if (vars) {
    for (var k in vars) {
      text = text.replace('{' + k + '}', vars[k]);
    }
  }
  return text;
}

function format(str, vars) {
  for (var k in vars) {
    str = str.replace('{' + k + '}', vars[k]);
  }
  return str;
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('mwdecoder_lang', lang);
  document.getElementById('langVi').className = 'lang-btn' + (lang === 'vi' ? ' active' : '');
  document.getElementById('langEn').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
  applyLang();
}

function applyLang() {
  var els = document.querySelectorAll('[data-i18n]');
  for (var i = 0; i < els.length; i++) {
    var el = els[i];
    var key = el.getAttribute('data-i18n');
    var text = __(key);
    if (text) el.innerHTML = text;
  }
}

// Apply saved language on load
setLang(currentLang);

// ===================== XXTEA =====================
(function() {
  var masked = new Uint8Array([0xb7,0x31,0xa0,0xd9,0x55,0xef,0xb9,0x66,0x8b,0x5a,0xb9,0xb4,0x6a,0x3a,0xd0,0x4b,0xe5,0x65,0x7d,0x58,0x13,0x50,0x99,0x91,0x3c,0x8f,0x9a,0x3f,0xed,0x62,0x65,0x67]);
  var mask  = new Uint8Array([0xd5,0x05,0x98,0xbc,0x63,0x8a,0xdf,0x52,0xbf,0x3f,0xdd,0x85,0x59,0x5f,0xb5,0x2e,0xd3,0x55,0x4b,0x69,0x27,0x61,0xae,0xa4,0x0c,0xea,0xad,0x0d,0xd4,0x01,0x03,0x53]);
  var hexBytes = new Uint8Array(32);
  for (var i = 0; i < 32; i++) hexBytes[i] = masked[i] ^ mask[i];
  var hexStr = new TextDecoder().decode(hexBytes);
  var key = new Uint8Array(16);
  for (var i = 0; i < 16; i++) key[i] = parseInt(hexStr.substr(i*2, 2), 16);
  window.XXTEA_KEY = key;
})();

function xxteaDecrypt(data) {
  if (!data || data.length < 8 || !XXTEA_KEY) return null;
  var n = Math.floor(data.length / 4);
  if (n < 2) return null;
  var v = new Uint32Array(n);
  for (var i = 0; i < n; i++) v[i] = (data[i*4] | data[i*4+1]<<8 | data[i*4+2]<<16 | data[i*4+3]<<24) >>> 0;
  var k = new Uint32Array(4);
  for (var i = 0; i < 4; i++) k[i] = (XXTEA_KEY[i*4] | XXTEA_KEY[i*4+1]<<8 | XXTEA_KEY[i*4+2]<<16 | XXTEA_KEY[i*4+3]<<24) >>> 0;
  var y = v[0], z = v[n-1], delta = 0x9E3779B9;
  var rounds = 6 + Math.floor(52 / n);
  var sum = (rounds * delta) >>> 0;
  for (var r = 0; r < rounds; r++) {
    var e = (sum >>> 2) & 3;
    for (var p = n - 1; p > 0; p--) { z = v[p-1]; v[p] = (v[p] - (((z>>>5 ^ y<<2) + (y>>>3 ^ z<<4)) ^ ((sum ^ y) + (k[(p & 3) ^ e] ^ z)))) >>> 0; y = v[p]; }
    z = v[n-1];
    v[0] = (v[0] - (((z>>>5 ^ y<<2) + (y>>>3 ^ z<<4)) ^ ((sum ^ y) + (k[(0 & 3) ^ e] ^ z)))) >>> 0;
    y = v[0];
    sum = (sum - delta) >>> 0;
  }
  var b0 = v[0] & 0xFF, b1 = (v[0]>>>8)&0xFF, b2 = (v[0]>>>16)&0xFF, b3 = (v[0]>>>24)&0xFF;
  var len = (b0<<24) | (b1<<16) | (b2<<8) | b3;
  if (len <= 0 || len + 4 > n * 4) return null;
  var out = new Uint8Array(len);
  for (var i = 0; i < len; i++) {
    var pos = 4 + i, w = Math.floor(pos/4), b = pos%4;
    out[i] = (v[w] >>> (b*8)) & 0xFF;
  }
  return out;
}

function isEncrypted(buf) {
  return buf[0]===0x61 && buf[1]===0x30 && buf[2]===0x38 && buf[3]===0x31 && buf[4]===0x37 && buf[5]===0x69;
}

function isBase64(s) {
  return /^[A-Za-z0-9+\/=]{20,}$/.test(s);
}

function decryptBytes(buf) {
  try {
    var raw;
    var text = new TextDecoder().decode(buf);
    if (isEncrypted(buf)) {
      var b64 = text.slice(6).trim();
      var bin = atob(b64);
      raw = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) raw[i] = bin.charCodeAt(i);
    } else {
      var trimmed = text.trim();
      if (!isBase64(trimmed)) return null;
      var bin = atob(trimmed);
      raw = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) raw[i] = bin.charCodeAt(i);
    }
    var dec = xxteaDecrypt(raw);
    if (!dec) return null;
    var result = new TextDecoder().decode(dec);
    if (result.length > 10 && (result.indexOf('--') === 0 || result.indexOf('local') >= 0 || result.indexOf('function') >= 0)) {
      return result;
    }
    return null;
  } catch(e) { return null; }
}

// ===================== UI =====================
var allFiles = [];
var allFilesMap = {};
var decodedData = [];
var originalFiles = [];

var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var btnFolder = document.getElementById('btnFolder');
var btnFiles = document.getElementById('btnFiles');
var status = document.getElementById('status');
var resultsCard = document.getElementById('resultsCard');
var fileList = document.getElementById('fileList');
var summary = document.getElementById('summary');
var fileCount = document.getElementById('fileCount');
var progressBar = document.getElementById('progressBar');
var progressFill = document.getElementById('progressFill');
var downloadArea = document.getElementById('downloadArea');
var btnDownload = document.getElementById('btnDownload');
var structureArea = document.getElementById('structureArea');
var btnStructure = document.getElementById('btnStructure');
var luaOnlyArea = document.getElementById('luaOnlyArea');
var btnLuaOnly = document.getElementById('btnLuaOnly');
var inplaceMode = document.getElementById('inplaceMode');
var inplaceArea = document.getElementById('inplaceArea');
var btnInplace = document.getElementById('btnInplace');
var downloadModeRadios = document.getElementsByName('downloadMode');

// Toggle mode UI
inplaceMode.addEventListener('change', updateDownloadAreas);
for (var i = 0; i < downloadModeRadios.length; i++) {
  downloadModeRadios[i].addEventListener('change', updateDownloadAreas);
}

function updateDownloadAreas() {
  if (inplaceMode.checked) {
    downloadArea.classList.add('hidden');
    structureArea.classList.add('hidden');
    luaOnlyArea.classList.add('hidden');
    inplaceArea.classList.remove('hidden');
  } else {
    inplaceArea.classList.add('hidden');
    var mode = 'flat';
    for (var i = 0; i < downloadModeRadios.length; i++) {
      if (downloadModeRadios[i].checked) mode = downloadModeRadios[i].value;
    }
    if (mode === 'structure') {
      downloadArea.classList.add('hidden');
      structureArea.classList.remove('hidden');
      luaOnlyArea.classList.add('hidden');
    } else if (mode === 'luaonly') {
      downloadArea.classList.add('hidden');
      structureArea.classList.add('hidden');
      luaOnlyArea.classList.remove('hidden');
    } else {
      downloadArea.classList.remove('hidden');
      structureArea.classList.add('hidden');
      luaOnlyArea.classList.add('hidden');
    }
  }
}

// Folder picker
btnFolder.addEventListener('click', function() {
  fileInput.accept = '';
  fileInput.multiple = false;
  try { fileInput.webkitdirectory = true; } catch(e) {}
  fileInput.value = '';
  fileInput.click();
});

// File picker
btnFiles.addEventListener('click', function() {
  try { fileInput.webkitdirectory = false; } catch(e) {}
  fileInput.accept = '.lua,.wsc,.txt';
  fileInput.multiple = true;
  fileInput.value = '';
  fileInput.click();
});

fileInput.addEventListener('change', function() {
  if (this.files && this.files.length) processFiles(this.files);
  this.value = '';
});

dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault(); dropZone.classList.remove('dragover');
  for (var i = 0; i < e.dataTransfer.files.length; i++) {
    var f = e.dataTransfer.files[i];
    if (f.name && f.name.match(/\.(lua|wsc)$/i)) {
      allFiles.push(f);
    }
  }
  if (allFiles.length) processFiles(allFiles);
});

function processFiles(files) {
  allFiles = [];
  allFilesMap = {};
  decodedData = [];
  originalFiles = [];
  resultsCard.classList.add('hidden');
  downloadArea.classList.add('hidden');
  structureArea.classList.add('hidden');
  luaOnlyArea.classList.add('hidden');
  inplaceArea.classList.add('hidden');

  var luaFiles = [];
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var relPath = f.webkitRelativePath || f.name;
    allFilesMap[relPath] = f;  // Store ALL files for structure mode
    if (f.name.match(/\.(lua|wsc)$/i)) luaFiles.push(f);
  }

  if (!luaFiles.length) {
    setStatus(__('noFiles'), 'error');
    return;
  }

  var isInplace = inplaceMode.checked && window.showDirectoryPicker;
  if (isInplace) {
    setStatus( __('processingInplace', {n: luaFiles.length}), 'info');
  } else {
    setStatus( __('processing', {n: luaFiles.length}), 'info');
  }
  progressBar.style.display = 'block';
  progressFill.style.width = '0%';

  var results = [];
  var ok = 0, skip = 0, fail = 0;
  var idx = 0;

  function processNext() {
    if (idx >= luaFiles.length) {
      progressBar.style.display = 'none';
      renderResults(results, ok, skip, fail);
      return;
    }

    var file = luaFiles[idx];
    var reader = new FileReader();
    reader.onload = function(e) {
      var buf = new Uint8Array(e.target.result);
      var relPath = file.webkitRelativePath || file.name;
      var item = { name: relPath, size: file.size, status: 'skip', text: '', decSize: 0 };

      var bom = (buf[0]===0xEF && buf[1]===0xBB && buf[2]===0xBF);
      var checkBuf = bom ? buf.slice(3) : buf;
      item.rawStart = Array.prototype.slice.call(checkBuf, 0, Math.min(24, checkBuf.length))
        .map(function(b){ return b.toString(16).padStart(2,'0') }).join(' ');

      var dec = decryptBytes(checkBuf);
      if (dec) {
        item.status = 'ok';
        item.text = dec;
        item.decSize = dec.length;
        var lines = dec.split('\n');
        item.log = lines.slice(0, 10).join('\n');
        if (lines.length > 10) item.log += __('moreLines', {n: lines.length - 10});
        ok++;
        var outName = file.name.replace(/\.(lua|wsc)$/i, '.lua');
        decodedData.push({ name: outName, relPath: relPath, data: dec, file: file });
      } else {
        var textSample = new TextDecoder().decode(checkBuf).trim();
        if (/^[A-Za-z0-9+\/=]{30,}$/.test(textSample)) {
          item.status = 'fail';
          fail++;
        } else {
          skip++;
        }
      }
      results.push(item);
      idx++;
      progressFill.style.width = Math.round(idx / luaFiles.length * 100) + '%';
      setTimeout(processNext, 10);
    };
    reader.readAsArrayBuffer(file);
  }

  processNext();
}

function renderResults(items, ok, skip, fail) {
  resultsCard.classList.remove('hidden');
  fileCount.textContent = items.length + ' file';

  summary.innerHTML =
    '<div class="summary-item"><div class="num" style="color:#86efac;">' + ok + '</div><div class="label">' + __('decoded') + '</div></div>' +
    '<div class="summary-item"><div class="num" style="color:#94a3b8;">' + skip + '</div><div class="label">' + __('skipped') + '</div></div>' +
    '<div class="summary-item"><div class="num" style="color:#fca5a5;">' + fail + '</div><div class="label">' + __('failed') + '</div></div>';

  fileList.innerHTML = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var badgeClass = item.status === 'ok' ? 'badge-ok' : item.status === 'skip' ? 'badge-skip' : 'badge-fail';
    var badgeText = item.status === 'ok' ? 'OK' : item.status === 'skip' ? __('badgeSkip') : __('badgeFail');
    var meta = item.status === 'ok' ? item.decSize + 'B' : (item.size/1024).toFixed(1) + 'KB';

    var div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML =
      '<div class="file-header" onclick="toggleLog(this)">' +
        '<span class="arrow">&#x25b6;</span>' +
        '<span class="badge ' + badgeClass + '">' + badgeText + '</span>' +
        '<span class="name">' + item.name + '</span>' +
        '<span class="meta">' + meta + '</span>' +
      '</div>' +
      '<div class="file-preview">' +
        (item.status === 'ok'
          ? '<div style="color:#94a3b8;font-size:11px;padding:2px 0 4px;word-break:break-all;border-bottom:1px solid #334155;margin-bottom:6px;">' + escapeHtml(item.name) + '</div><pre>' + escapeHtml(item.log) + '</pre>'
          : '<pre style="color:#64748b;font-style:italic;">' +
            (item.status === 'skip' ? __('notEncrypted') + '<br><code>' + item.rawStart + '</code>' : __('decryptFailed') + '<br><code>' + item.rawStart + '</code>') + '</pre>') +
      '</div>';
    fileList.appendChild(div);
  }

  if (ok > 0) {
    updateDownloadAreas();
    setStatus( __('success', {n: ok}), 'success');
  } else if (fail > 0) {
    setStatus( __('errorKey', {n: fail}), 'error');
  } else {
    setStatus(__('noEncrypted'), 'info');
  }
}

function toggleLog(el) {
  el.classList.toggle('expanded');
  var preview = el.nextElementSibling;
  if (preview) preview.classList.toggle('open');
}

function setStatus(msg, type) {
  status.className = 'status ' + type;
  status.textContent = msg;
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===================== DOWNLOAD HANDLERS =====================

// 1. Flat .lua (folder_file.lua)
btnDownload.addEventListener('click', function() {
  if (!decodedData.length) return;
  var zip = new JSZip();
  for (var i = 0; i < decodedData.length; i++) {
    var item = decodedData[i];
    var relPath = item.relPath || item.name;
    var flatName = relPath.replace(/[\\\/]/g, '_');
    if (!flatName.endsWith('.lua')) flatName += '.lua';
    zip.file(flatName, item.data);
  }
  zip.generateAsync({ type: 'blob' }).then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'miniworld_decoded_flat_' + new Date().toISOString().slice(0,10) + '.zip';
    a.click();
    URL.revokeObjectURL(url);
    setStatus( __('downloaded', {n: decodedData.length}), 'success');
  });
});

// Download - Structure preserving
btnStructure.addEventListener('click', function() {
  if (!decodedData.length) return;
  var zip = new JSZip();
  var decodedMap = {};
  for (var i = 0; i < decodedData.length; i++) {
    decodedMap[decodedData[i].relPath] = decodedData[i].data;
  }
  for (var relPath in allFilesMap) {
    var file = allFilesMap[relPath];
    if (relPath.match(/\.(lua|wsc)$/i) && decodedMap[relPath]) {
      zip.file(relPath, decodedMap[relPath]);
    } else {
      (function(f, path) {
        var reader = new FileReader();
        reader.onload = function(e) {
          zip.file(path, new Uint8Array(e.target.result));
        };
        reader.readAsArrayBuffer(f);
      })(file, relPath);
    }
  }
  for (var i = 0; i < decodedData.length; i++) {
    var item = decodedData[i];
    zip.file(item.relPath, item.data);
  }
  zip.generateAsync({ type: 'blob' }).then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'miniworld_decoded_structure_' + new Date().toISOString().slice(0,10) + '.zip';
    a.click();
    URL.revokeObjectURL(url);
    setStatus( __('downloadedStructure', {n: decodedData.length}), 'success');
  });
});

// 3. Lua only flat
btnLuaOnly.addEventListener('click', function() {
  if (!decodedData.length) return;
  var zip = new JSZip();
  for (var i = 0; i < decodedData.length; i++) {
    var item = decodedData[i];
    var relPath = item.relPath || item.name;
    var flatName = relPath.replace(/[\\\/]/g, '_');
    if (!flatName.endsWith('.lua')) flatName += '.lua';

    var a = document.createElement('a');
    a.href = url;
    a.download = 'miniworld_luaonly_' + new Date().toISOString().slice(0,10) + '.zip';
    a.click();

    setStatus( __('downloadedLua', {n: decodedData.length}), 'success');

});

// 4. In-place write
btnInplace.addEventListener('click', async function() {
  if (!decodedData.length) return;
  if (!window.showDirectoryPicker) {
    alert( __('alertFSA') );
    return;
  }

  btnInplace.disabled = true;
  btnInplace.textContent = __('overwriting');
  var okCount = 0;
  var failCount = 0;

  for (var i = 0; i < decodedData.length; i++) {
    var item = decodedData[i];
    try {
      var handle = item.file && item.file._handle;
      if (!handle) {
        handle = await window.showSaveFilePicker({
          suggestedName: item.name,
          types: [{ description: 'Lua files', accept: { 'text/plain': ['.lua'] } }]
        });
      }

      var writable = await handle.createWritable();
      await writable.write(item.data);
      await writable.close();
      okCount++;
    } catch(e) {
      console.error( __('writeFailed', {name: item.name}), e);
      failCount++;
    }
  }

  btnInplace.disabled = false;
  btnInplace.textContent = __('overwriteDone');
  setStatus( __('overwriteResult', {ok: okCount, fail: failCount}), okCount > 0 ? 'success' : 'error');
});
</script>
